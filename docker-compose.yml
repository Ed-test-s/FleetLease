services:
  db:
    image: postgres:16-alpine
    container_name: fleetlease-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: fleetlease
      POSTGRES_USER: fleetlease
      POSTGRES_PASSWORD: fleetlease_secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fleetlease"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: fleetlease-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 3

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fleetlease-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://fleetlease:fleetlease_secret@db:5432/fleetlease
      DATABASE_URL_SYNC: postgresql://fleetlease:fleetlease_secret@db:5432/fleetlease
      SECRET_KEY: super-secret-key-change-in-production
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      MINIO_BUCKET: fleetlease
      MINIO_EXTERNAL_ENDPOINT: localhost:9000
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: >
      sh -lc "cd /app &&
      PYTHONPATH=/app python -m app.scripts.bootstrap_db &&
      uvicorn app.main:app --reload --host 0.0.0.0 --port 8000 --reload-dir /app"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fleetlease-frontend
    restart: unless-stopped
    environment:
      VITE_DEV_PROXY_TARGET: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 3000

volumes:
  pgdata:
  minio_data:
