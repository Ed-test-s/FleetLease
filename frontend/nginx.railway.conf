server {
    listen 80;
    server_name _;

    return 301 https://$host$request_uri;
}

server {
    listen 443;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location /api/v1/ {
        proxy_pass https://backend-production-8b329.up.railway.app/api/v1/;

        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_name backend-production-8b329.up.railway.app;

        proxy_set_header Host backend-production-8b329.up.railway.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
}

    location / {
        try_files $uri $uri/ /index.html;
    }
}
